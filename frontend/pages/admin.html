<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AI Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="text-gradient">AI Platform</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">Dashboard Overview</a>
                <a href="#" class="nav-item">Manage Users</a>
                <a href="#" class="nav-item">System Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-outline btn-block">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                    <h3>Admin Panel</h3>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="user-name-display">Loading...</span>
                            <span class="user-role">Administrator</span>
                        </div>
                        <div class="user-avatar">A</div>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="dashboard-grid">
                    <div class="stat-card">
                        <span class="stat-title">Total Users</span>
                        <span class="stat-value" id="total-users-count">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-title">Active Sessions</span>
                        <span class="stat-value text-gradient">1</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-title">System Status</span>
                        <span class="stat-value" style="color: var(--success-color)">Online</span>
                    </div>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <h3>User Management</h3>
                        <button class="btn btn-primary" onclick="alert('Add User form coming soon')">Add User</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Department</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
