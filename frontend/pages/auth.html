<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication - AI Platform</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-d8V+j4OYjv0YIUS5hJANFS6p6QrQynId2uYQuY6nRkXrW3Ldq3rxRX0JXaHy6LzV8WudhQRSP7Phc3Eza40Gkg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-dark);
        position: relative;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(99, 102, 241, 0.05),
          transparent 60%
        );
        z-index: -1;
      }

      .auth-container {
        width: 100%;
        max-width: 440px;
        padding: 2rem;
        z-index: 10;
      }

      .auth-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 2.5rem;
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(20px);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-header h2 {
        font-size: 2rem;
        color: white;
        font-family: "Outfit", sans-serif;
        margin-bottom: 0.5rem;
      }

      .auth-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .auth-tabs {
        display: flex;
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--radius-sm);
        padding: 0.3rem;
        margin-bottom: 2rem;
      }

      .auth-tab {
        flex: 1;
        text-align: center;
        padding: 0.6rem;
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 500;
        font-size: 0.95rem;
        border-radius: var(--radius-sm);
        transition: var(--transition);
      }

      .auth-tab.active {
        background: var(--primary-gradient);
        color: white;
        box-shadow: var(--shadow-glow);
      }

      .form-section {
        display: none;
        animation: fadeIn 0.4s ease;
      }

      .form-section.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .social-login {
        margin-top: 1.5rem;
        text-align: center;
      }

      .divider {
        display: flex;
        align-items: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        margin: 1.5rem 0;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid var(--border-color);
        margin: 0 10px;
      }

      .btn-social {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 0.75rem;
        border-radius: var(--radius-sm);
        font-family: "Inter", sans-serif;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: var(--transition);
      }

      .btn-social:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger-color);
        padding: 0.75rem;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
        display: none;
        border: 1px solid rgba(239, 68, 68, 0.2);
        text-align: center;
      }

      .back-link {
        position: absolute;
        top: 2rem;
        left: 2rem;
        color: var(--text-muted);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .back-link:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>

    <a href="index.html" class="back-link">← Return Home</a>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>CampusConnect</h2>
          <p>Welcome back! Please enter your details.</p>
        </div>

        <div class="auth-tabs">
          <div
            class="auth-tab active"
            onclick="switchTab('login')"
            id="tab-login"
          >
            Log In
          </div>
          <div
            class="auth-tab"
            onclick="switchTab('register')"
            id="tab-register"
          >
            Sign Up
          </div>
        </div>

        <div id="error-container" class="error-message"></div>

        <!-- Login Form -->
        <form id="login-form" class="form-section active">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="login-email"
              class="form-control"
              placeholder="user@example.com"
              required
            />
          </div>
          <div class="form-group">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <label class="form-label">Password</label>
              <a href="reset.html" style="font-size: 0.85rem"
                >Forgot Password?</a
              >
            </div>
            <input
              type="password"
              id="login-password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-2">
            Log In
          </button>

          <div class="divider">or continue with</div>
          <button type="button" class="btn-social" data-provider="google">
            <i class="fab fa-google"></i>
            Google
          </button>
          <button
            type="button"
            class="btn-social"
            data-provider="github"
            style="margin-top: 0.75rem"
          >
            <i class="fab fa-github"></i>
            GitHub
          </button>
          <button
            type="button"
            class="btn-social"
            data-provider="facebook"
            style="margin-top: 0.75rem"
          >
            <i class="fab fa-facebook"></i>
            Facebook
          </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="form-section">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input
              type="text"
              id="reg-name"
              class="form-control"
              placeholder="John Doe"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="reg-email"
              class="form-control"
              placeholder="user@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              id="reg-password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Account Type</label>
            <select id="reg-role" class="form-control">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-2">
            Create Account
          </button>

          <div class="divider">or sign up with</div>
          <button type="button" class="btn-social" data-provider="google">
            <i class="fab fa-google"></i>
            Google
          </button>
          <button
            type="button"
            class="btn-social"
            data-provider="github"
            style="margin-top: 0.75rem"
          >
            <i class="fab fa-github"></i>
            GitHub
          </button>
          <button
            type="button"
            class="btn-social"
            data-provider="facebook"
            style="margin-top: 0.75rem"
          >
            <i class="fab fa-facebook"></i>
            Facebook
          </button>
        </form>
      </div>
    </div>

    <!-- Load api and auth scripts -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>

    <script>
      function switchTab(mode) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".form-section")
          .forEach((f) => f.classList.remove("active"));
        document.getElementById("error-container").style.display = "none";

        document.getElementById(`tab-${mode}`).classList.add("active");
        document.getElementById(`${mode}-form`).classList.add("active");

        // Update URL
        window.history.replaceState(null, null, `?mode=${mode}`);
      }

      // Check URL for mode
      const urlParams = new URLSearchParams(window.location.search);
      const mode = urlParams.get("mode");
      if (mode === "register") {
        switchTab("register");
      }
    </script>
  </body>
</html>
