<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication - CampusConnect</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-dark);
        padding: 15px;
      }
      .auth-container {
        width: 100%;
        max-width: 440px;
      }
      .auth-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 2.25rem 1.75rem;
        box-shadow: var(--shadow-md);
        width: 100%;
      }
      .auth-header {
        text-align: center;
        margin-bottom: 1.75rem;
      }
      .auth-tabs {
        display: flex;
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--radius-sm);
        padding: 0.25rem;
        margin-bottom: 1.5rem;
      }
      .auth-tab {
        flex: 1;
        text-align: center;
        padding: 0.6rem;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: var(--radius-sm);
        transition: var(--transition);
        font-weight: 500;
      }
      .auth-tab.active {
        background: var(--primary-gradient);
        color: white;
      }
      .form-section {
        display: none;
      }
      .form-section.active {
        display: block;
      }
      .divider {
        display: flex;
        align-items: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        margin: 1.25rem 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid var(--border-color);
        margin: 0 10px;
      }
      .social-login {
        display: flex;
        gap: 1rem;
        justify-content: center;
      }
      .btn-social-icon {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: transparent;
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        color: #e2e8f0;
        font-size: 1.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
      }
      .btn-social-icon:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.05);
        border-color: white;
      }
      .password-container {
        position: relative;
        display: flex;
        align-items: center;
      }
      .toggle-password {
        position: absolute;
        right: 1rem;
        color: var(--text-muted);
        cursor: pointer;
      }
      .back-link {
        position: absolute;
        top: 1.5rem;
        left: 1.5rem;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>
    <a href="index.html" class="back-link">← Return Home</a>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2 class="text-gradient" style="font-size: 2.25rem">
            CampusConnect
          </h2>
          <p style="color: var(--text-muted); margin-top: 5px">
            Secure Account Portal
          </p>
        </div>

        <div class="auth-tabs">
          <div
            class="auth-tab active"
            onclick="switchTab('login')"
            id="tab-login"
          >
            Log In
          </div>
          <div
            class="auth-tab"
            onclick="switchTab('register')"
            id="tab-register"
          >
            Sign Up
          </div>
        </div>

        <div
          id="error-container"
          class="form-group"
          style="
            display: none;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
          "
        ></div>

        <form id="login-form" class="form-section active">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="login-email"
              class="form-control"
              placeholder="name@example.com"
              required
            />
          </div>
          <div class="form-group">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
              "
            >
              <label class="form-label" style="margin: 0">Password</label>
              <a href="reset.html" style="font-size: 0.85rem">Forgot?</a>
            </div>
            <div class="password-container">
              <input
                type="password"
                id="login-password"
                class="form-control"
                placeholder="••••••••"
                required
              />
              <i
                class="fas fa-eye toggle-password"
                onclick="togglePassword('login-password', this)"
              ></i>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Log In
          </button>
          <div class="divider">or login with</div>
          <div class="social-login">
            <button
              type="button"
              class="btn-social-icon btn-social"
              data-provider="google"
            >
              <i class="fab fa-google"></i>
            </button>
            <button
              type="button"
              class="btn-social-icon btn-social"
              data-provider="github"
            >
              <i class="fab fa-github"></i>
            </button>
          </div>
        </form>

        <form id="register-form" class="form-section">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input
              type="text"
              id="reg-name"
              class="form-control"
              placeholder="John Doe"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="reg-email"
              class="form-control"
              placeholder="john@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-container">
              <input
                type="password"
                id="reg-password"
                class="form-control"
                placeholder="••••••••"
                required
              />
              <i
                class="fas fa-eye toggle-password"
                onclick="togglePassword('reg-password', this)"
              ></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Account Type</label>
            <select
              id="reg-role"
              class="form-control"
              style="background-color: var(--bg-surface); color: white"
            >
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Create Account
          </button>
        </form>
      </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
      function switchTab(mode) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".form-section")
          .forEach((f) => f.classList.remove("active"));
        document.getElementById(`tab-${mode}`).classList.add("active");
        document.getElementById(`${mode}-form`).classList.add("active");
      }
      function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        input.type = input.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
      }
    </script>
  </body>
</html>
