<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - AI Platform</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 class="text-gradient">AI Platform</h2>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active">Dashboard Overview</a>
          <a href="#pending-section" class="nav-item">Pending Approvals</a>
          <a href="#users-section" class="nav-item">Manage Users</a>
        </nav>
        <div class="sidebar-footer">
          <button id="logout-btn" class="btn btn-outline btn-block">
            Logout
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-nav">
          <div class="nav-left">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h3>Admin Panel</h3>
          </div>
          <div class="nav-right">
            <div class="user-profile">
              <div class="user-info">
                <span class="user-name" id="user-name-display">Loading...</span>
                <span class="user-role">Administrator</span>
              </div>
              <div class="user-avatar">A</div>
            </div>
          </div>
        </header>

        <div class="content-area">
          <div class="dashboard-grid">
            <div class="stat-card">
              <span class="stat-title">Total Approved Users</span>
              <span class="stat-value" id="total-users-count">0</span>
            </div>
            <div
              class="stat-card"
              style="border-left: 4px solid var(--primary-color)"
            >
              <span class="stat-title">Pending Approvals</span>
              <span class="stat-value text-gradient" id="pending-users-count"
                >0</span
              >
            </div>
            <div class="stat-card">
              <span class="stat-title">System Status</span>
              <span class="stat-value" style="color: var(--success-color)"
                >Online</span
              >
            </div>
          </div>

          <div
            class="card"
            id="pending-section"
            style="
              margin-bottom: 2rem;
              border-top: 4px solid var(--primary-color);
            "
          >
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1.5rem;
              "
            >
              <h3>New Account Requests (Pending)</h3>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="pending-users-table-body"></tbody>
              </table>
            </div>
          </div>

          <div class="card" id="users-section">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1.5rem;
              "
            >
              <h3>Active Users Management</h3>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="users-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/admin.js"></script>
  </body>
</html>
