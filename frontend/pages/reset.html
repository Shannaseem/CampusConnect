<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - CampusConnect</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-dark);
        padding: 15px;
      }
      .auth-container {
        width: 100%;
        max-width: 420px;
      }
      .auth-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 2rem 1.5rem;
        box-shadow: var(--shadow-md);
        width: 100%;
      }
      .back-link {
        position: absolute;
        top: 1.5rem;
        left: 1.5rem;
        color: var(--text-muted);
        font-weight: 500;
        text-decoration: none;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>
    <a href="index.html" class="back-link">← Return Home</a>
    <div class="auth-container">
      <div class="auth-card">
        <div
          class="auth-header"
          style="text-align: center; margin-bottom: 1.5rem"
        >
          <h2 class="text-gradient">Reset Password</h2>
          <p
            style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px"
          >
            Enter credentials or recovery token
          </p>
        </div>

        <div
          id="error-container"
          style="
            display: none;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
          "
        ></div>
        <div
          id="success-container"
          style="
            display: none;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
          "
        ></div>

        <form id="request-reset-form">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="reset-email"
              class="form-control"
              placeholder="user@example.com"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Send Reset Link
          </button>
        </form>

        <div
          style="
            margin: 1.25rem 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.8rem;
          "
        >
          <span
            style="flex: 1; border-bottom: 1px solid var(--border-color)"
          ></span>
          <span style="padding: 0 10px">OR USE TOKEN</span>
          <span
            style="flex: 1; border-bottom: 1px solid var(--border-color)"
          ></span>
        </div>

        <form id="reset-password-form">
          <div class="form-group">
            <label class="form-label">Reset Token</label>
            <input
              type="text"
              id="reset-token"
              class="form-control"
              placeholder="Paste verification token"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input
              type="password"
              id="new-password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn-secondary btn-block">
            Update Password
          </button>
        </form>
      </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
      const errorContainer = document.getElementById("error-container");
      const successContainer = document.getElementById("success-container");

      function showError(message) {
        errorContainer.style.display = "block";
        errorContainer.textContent = message;
        successContainer.style.display = "none";
      }
      function showSuccess(message) {
        successContainer.style.display = "block";
        successContainer.textContent = message;
        errorContainer.style.display = "none";
      }

      document
        .getElementById("request-reset-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          try {
            const response = await api.post("/auth/request-reset", {
              email: document.getElementById("reset-email").value,
            });
            showSuccess(response.message || "Email request dispatched.");
          } catch (err) {
            showError(err.message);
          }
        });

      document
        .getElementById("reset-password-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          try {
            const response = await api.post("/auth/reset", {
              token: document.getElementById("reset-token").value,
              new_password: document.getElementById("new-password").value,
            });
            showSuccess(response.message || "Verification passed. Updated!");
          } catch (err) {
            showError(err.message);
          }
        });

      const params = new URLSearchParams(window.location.search);
      if (params.get("reset_token")) {
        document.getElementById("reset-token").value =
          params.get("reset_token");
      }
    </script>
  </body>
</html>
