<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard - CampusConnect</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="brand-info">
            <i class="fas fa-graduation-cap"></i>
            <span class="brand-text">CampusConnect</span>
          </div>
          <button id="sidebar-toggle" class="sidebar-toggle-btn">
            <i class="fas fa-bars"></i>
          </button>
        </div>
        <nav class="sidebar-nav">
          <a
            href="#"
            class="nav-item active"
            onclick="switchTeacherTab('operations', this)"
            ><i class="fas fa-briefcase"></i> <span>Operations</span></a
          >
          <a
            href="#"
            class="nav-item"
            onclick="switchTeacherTab('mysubjects', this)"
            ><i class="fas fa-book-open"></i> <span>My Subjects</span></a
          >
        </nav>
      </aside>

      <main class="main-content">
        <header class="top-nav">
          <div
            class="nav-left"
            style="display: flex; align-items: center; gap: 15px"
          >
            <button
              class="menu-toggle"
              id="mobile-menu-btn"
              onclick="
                document
                  .getElementById('sidebar')
                  .classList.toggle('mobile-open');
                document
                  .querySelector('.sidebar-overlay')
                  .classList.toggle('show');
              "
              style="
                display: none;
                background: transparent;
                border: none;
                font-size: 1.5rem;
                cursor: pointer;
                color: var(--dark-color);
              "
            >
              <i class="fas fa-bars"></i>
            </button>
            <h3 id="panel-title" style="margin: 0">Daily Operations</h3>
          </div>
          <div class="nav-right">
            <button id="logout-btn" class="btn-logout">
              <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </button>
            <div class="user-profile">
              <div class="user-info">
                <span class="user-name" id="user-name-display">Loading...</span>
                <span class="user-role" id="user-role-display">TEACHER</span>
              </div>
              <div class="user-avatar" id="user-avatar-initial">T</div>
            </div>
          </div>
        </header>

        <div class="content-area">
          <div id="tab-operations" class="tab-content active">
            <div class="dashboard-grid">
              <div
                class="card"
                style="border-top: 4px solid var(--primary-color)"
              >
                <h3><i class="fas fa-file-upload"></i> Post Assignment</h3>
                <form id="assignment-form">
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Select Subject</label>
                    <select
                      id="assign-subject"
                      class="admin-form-control"
                      required
                    >
                      <option value="">Loading subjects...</option>
                    </select>
                  </div>
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Assignment Title</label>
                    <input
                      type="text"
                      id="assign-title"
                      class="admin-form-control"
                      placeholder="e.g. Chapter 1 Quiz"
                      required
                    />
                  </div>
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Description</label>
                    <textarea
                      id="assign-desc"
                      class="admin-form-control"
                      rows="2"
                      placeholder="Brief details about the task..."
                      required
                    ></textarea>
                  </div>
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Deadline</label>
                    <input
                      type="datetime-local"
                      id="assign-deadline"
                      class="admin-form-control"
                      required
                    />
                  </div>
                  <button
                    type="submit"
                    class="btn btn-primary"
                    style="width: 100%; margin-top: 10px"
                  >
                    Publish Assignment
                  </button>
                </form>
              </div>

              <div class="card" style="border-top: 4px solid #10b981">
                <h3><i class="fas fa-clipboard-check"></i> Mark Attendance</h3>
                <form id="attendance-form">
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Subject</label>
                    <select
                      id="att-subject"
                      class="admin-form-control"
                      required
                    >
                      <option value="">Loading subjects...</option>
                    </select>
                  </div>
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Student ID</label>
                    <input
                      type="number"
                      id="att-student-id"
                      class="admin-form-control"
                      placeholder="Enter Numeric Student ID"
                      required
                    />
                  </div>
                  <div class="admin-form-group" style="margin-bottom: 12px">
                    <label>Status</label>
                    <select id="att-status" class="admin-form-control" required>
                      <option value="present">Present</option>
                      <option value="absent">Absent</option>
                      <option value="late">Late</option>
                    </select>
                  </div>
                  <button
                    type="submit"
                    class="btn btn-success"
                    style="width: 100%; margin-top: 10px"
                  >
                    Save Attendance
                  </button>
                </form>
              </div>
            </div>
          </div>

          <div id="tab-mysubjects" class="tab-content">
            <div class="card">
              <h3><i class="fas fa-book-open"></i> Assigned Subjects</h3>
              <div class="table-container">
                <table>
                  <thead>
                    <tr>
                      <th>Subject Code</th>
                      <th>Title</th>
                      <th>Department</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="teacher-subjects-body">
                    <tr>
                      <td colspan="4" style="text-align: center">
                        Loading subjects...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/teacher.js"></script>
  </body>
</html>
