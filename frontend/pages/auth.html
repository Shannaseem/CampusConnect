<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication - AI Platform</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-d8V+j4OYjv0YIUS5hJANFS6p6QrQynId2uYQuY6nRkXrW3Ldq3rxRX0JXaHy6LzV8WudhQRSP7Phc3Eza40Gkg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-dark);
        position: relative;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(99, 102, 241, 0.05),
          transparent 60%
        );
        z-index: -1;
      }

      .auth-container {
        width: 100%;
        max-width: 440px;
        padding: 2rem;
        z-index: 10;
      }
      .auth-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 2.5rem;
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(20px);
      }
      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .auth-header h2 {
        font-size: 2rem;
        color: white;
        font-family: "Outfit", sans-serif;
        margin-bottom: 0.5rem;
      }
      .auth-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .auth-tabs {
        display: flex;
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--radius-sm);
        padding: 0.3rem;
        margin-bottom: 2rem;
      }
      .auth-tab {
        flex: 1;
        text-align: center;
        padding: 0.6rem;
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 500;
        font-size: 0.95rem;
        border-radius: var(--radius-sm);
        transition: var(--transition);
      }
      .auth-tab.active {
        background: var(--primary-gradient);
        color: white;
        box-shadow: var(--shadow-glow);
      }

      .form-section {
        display: none;
        animation: fadeIn 0.4s ease;
      }
      .form-section.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .divider {
        display: flex;
        align-items: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        margin: 1.5rem 0 1rem 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid var(--border-color);
        margin: 0 10px;
      }

      .social-login {
        display: flex;
        gap: 1.25rem;
        justify-content: center;
        margin-top: 1rem;
      }
      .btn-social-icon {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: transparent;
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        color: #e2e8f0;
        font-size: 1.6rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-social-icon:hover {
        transform: translateY(-4px) scale(1.05);
        background: rgba(255, 255, 255, 0.05);
      }
      .btn-social-icon[data-provider="google"]:hover {
        color: #ff6b6b;
        border-color: #ff6b6b;
        box-shadow: 0 10px 20px rgba(255, 107, 107, 0.15);
      }
      .btn-social-icon[data-provider="github"]:hover {
        color: #ffffff;
        border-color: #ffffff;
        box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger-color);
        padding: 0.75rem;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
        display: none;
        border: 1px solid rgba(239, 68, 68, 0.2);
        text-align: center;
      }
      .back-link {
        position: absolute;
        top: 2rem;
        left: 2rem;
        color: var(--text-muted);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .back-link:hover {
        color: white;
      }

      /* Password Toggle Styles */
      .password-container {
        position: relative;
        display: flex;
        align-items: center;
      }
      .password-container input {
        padding-right: 2.5rem;
      }
      .toggle-password {
        position: absolute;
        right: 1rem;
        color: var(--text-muted);
        cursor: pointer;
        transition: var(--transition);
      }
      .toggle-password:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>

    <a href="index.html" class="back-link">← Return Home</a>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>CampusConnect</h2>
          <p>Welcome back! Please enter your details.</p>
        </div>

        <div class="auth-tabs">
          <div
            class="auth-tab active"
            onclick="switchTab('login')"
            id="tab-login"
          >
            Log In
          </div>
          <div
            class="auth-tab"
            onclick="switchTab('register')"
            id="tab-register"
          >
            Sign Up
          </div>
        </div>

        <div id="error-container" class="error-message"></div>

        <form id="login-form" class="form-section active">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="login-email"
              class="form-control"
              placeholder="user@example.com"
              required
            />
          </div>
          <div class="form-group">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <label class="form-label">Password</label>
              <a href="reset.html" style="font-size: 0.85rem"
                >Forgot Password?</a
              >
            </div>
            <div class="password-container">
              <input
                type="password"
                id="login-password"
                class="form-control"
                placeholder="••••••••"
                required
              />
              <i
                class="fas fa-eye toggle-password"
                onclick="togglePassword('login-password', this)"
                title="Show Password"
              ></i>
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary btn-block mt-2"
            style="width: 100%"
          >
            Log In
          </button>

          <div class="divider">or continue with</div>

          <div class="social-login">
            <button
              type="button"
              class="btn-social-icon btn-social"
              data-provider="google"
              title="Continue with Google"
            >
              <i class="fab fa-google"></i>
            </button>
            <button
              type="button"
              class="btn-social-icon btn-social"
              data-provider="github"
              title="Continue with GitHub"
            >
              <i class="fab fa-github"></i>
            </button>
          </div>
        </form>

        <form id="register-form" class="form-section">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input
              type="text"
              id="reg-name"
              class="form-control"
              placeholder="John Doe"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="reg-email"
              class="form-control"
              placeholder="user@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-container">
              <input
                type="password"
                id="reg-password"
                class="form-control"
                placeholder="••••••••"
                required
              />
              <i
                class="fas fa-eye toggle-password"
                onclick="togglePassword('reg-password', this)"
                title="Show Password"
              ></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Account Type</label>
            <select id="reg-role" class="form-control">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
            </select>
          </div>
          <button
            type="submit"
            class="btn btn-primary btn-block mt-2"
            style="width: 100%"
          >
            Create Account
          </button>

          <div class="divider">or sign up with</div>

          <div class="social-login">
            <button
              type="button"
              class="btn-social-icon btn-social"
              data-provider="google"
              title="Sign up with Google"
            >
              <i class="fab fa-google"></i>
            </button>
            <button
              type="button"
              class="btn-social-icon btn-social"
              data-provider="github"
              title="Sign up with GitHub"
            >
              <i class="fab fa-github"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>

    <script>
      function switchTab(mode) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".form-section")
          .forEach((f) => f.classList.remove("active"));
        document.getElementById("error-container").style.display = "none";

        document.getElementById(`tab-${mode}`).classList.add("active");
        document.getElementById(`${mode}-form`).classList.add("active");

        window.history.replaceState(null, null, `?mode=${mode}`);
      }

      // Password Toggle Function
      function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      const urlParams = new URLSearchParams(window.location.search);
      const mode = urlParams.get("mode");
      if (mode === "register") {
        switchTab("register");
      }
    </script>
  </body>
</html>
